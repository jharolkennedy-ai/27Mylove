<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestro Universo 🌌</title>
    <link href="https://fonts.googleapis.com/css2?family=Ms+Madi&family=Poppins:wght@300;800&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Poppins', sans-serif; overflow: hidden; 
            perspective: 1500px; height: 100vh; 
        }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s ease;
        }
        #btn-iniciar {
            padding: 20px 40px; font-size: 1.1rem; color: #00f2ff;
            background: transparent; border: 1px solid #00f2ff; cursor: pointer;
            border-radius: 50px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            text-transform: uppercase; letter-spacing: 3px;
        }

        #contenedor-musica { display: none; }
        #capa-total { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; cursor: grab; }

        #escena { 
            width: 100%; height: 100%; display: flex; 
            align-items: center; justify-content: center; transform-style: preserve-3d; 
        }
        
        #universo { transform-style: preserve-3d; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* CORAZONES 3D */
        .corazon-3d {
            position: absolute; font-size: 1.5rem; color: #ff4d6d;
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff758f;
            pointer-events: none; will-change: transform; user-select: none;
        }

        .planeta-sol {
            width: 110px; height: 110px; border-radius: 50%; background: #ff0044;
            box-shadow: 0 0 60px #ff0044, inset -10px -10px 30px #000;
            display: flex; align-items: center; justify-content: center;
            will-change: transform;
        }
        .texto-principal { font-family: 'Ms Madi', cursive; font-size: 2.8rem; margin: 0; pointer-events: none; }

        .frase-estelar {
            position: absolute; font-weight: 800; font-size: 0.7rem;
            color: #00f2ff; text-shadow: 0 0 10px #00f2ff;
            white-space: nowrap; text-transform: uppercase;
            pointer-events: none; will-change: transform;
        }

        .polvo { position: absolute; border-radius: 50%; background: #e0e0e0; opacity: 0.5; pointer-events: none; }
        
        .estrella-fija {
            position: absolute; background: #ffffff; border-radius: 50%;
            opacity: 0.3; pointer-events: none;
        }

        .planeta-oscuro {
            position: absolute; border-radius: 50%; transform-style: preserve-3d;
            background: radial-gradient(circle at 35% 35%, var(--c-claro) 0%, var(--c-oscuro) 40%, #000 85%);
            box-shadow: inset -5px -5px 25px rgba(0,0,0,0.9), 0 0 20px var(--c-claro);
            will-change: transform;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-iniciar">Entrar al Universo ✨</button>
    </div>

    <div id="contenedor-musica">
        <audio id="miMusica"
            <source src="Music/TikVid.io_7585344106113617159.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="capa-total"></div>

    <div id="escena">
        <div id="universo">
            <div class="planeta-sol"><h1 class="texto-principal">Te Amo</h1></div>
        </div>
    </div>

    <script>
        const univ = document.getElementById('universo');
        const capa = document.getElementById('capa-total');
        const overlay = document.getElementById('overlay');
        const musica = document.getElementById('miMusica');
        const btn = document.getElementById('btn-iniciar');

       btn.addEventListener('click', () => {
    musica.src = listaMusica[indiceActual]; // Carga la primera de la lista
    musica.play();
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 1500);
});

// Detector para cambiar a la siguiente cuando termine la primera
musica.onended = () => {
    indiceActual++; 
    if (indiceActual < listaMusica.length) {
        musica.src = listaMusica[indiceActual];
        musica.play();
    } else {
        // Si quieres que al terminar todo se repita la lista:
        indiceActual = 0;
        musica.src = listaMusica[0];
        musica.play();
    }
};
        // Lista de reproducción en orden específico
const listaMusica = [
    "Music/TikVid.io_7585344106113617159.mp3", // Primero TikTok
    "Music/A La Vida.mp3"                      // Luego A La Vida
];
let indiceActual = 0;
        let frases = ["Te amo", "Eres mi vida", "Mi todo", "Siempre juntos", "Eres magia", "Mi destino", "Mi paz", "Te adoro", "Eres mi sueño", "Mi refugio", "Eres única", "Felicidad", "Mi sol", "Mi luz", "Tesoro mío", "Amor eterno", "Infinita", "Mi alegría", "Te sueño", "Mi hogar", "Mi alma", "Corazón", "Te elijo siempre", "Me haces feliz", "Eres perfecta", "Mi gran amor", "Vida mía", "Eres mi fuerza", "Gracias por existir", "Dulce amor", "Mundo entero", "Pedacito de cielo", "Luz de mis ojos", "Eres mi calma", "Eres mi hogar", "Mi otra mitad", "Dueña de mi amor", "Beso eterno", "Mi mayor tesoro", "Pasión infinita", "Te extraño", "Siempre tuya", "Siempre tuyo", "Amor puro", "Cielo mío", "Mi inspiración", "Mi camino", "Mi verdad", "Mi razón de ser", "Te amo infinito", "Eres mi estrella", "Universo mío", "Mi paraíso", "Eres mi realidad", "Mi mejor parte", "Contigo siempre", "Amor de mi vida", "Mi suerte", "Eres mi deseo", "Mi esperanza", "Te amo locamente", "Mi complice", "Amor mío", "Estar contigo", "Tu sonrisa", "Tus ojos", "Mi calma", "Mi fuerza", "Mi protección", "Eres mi orgullo", "Mi ternura", "Amor sin fin", "Mi bendición", "Te amo tanto", "Eres mi mundo", "Dicha eterna", "Mi sentimiento", "Eres mi locura", "Mi armonía", "Te amo hoy", "Y mañana", "Y siempre", "Por siempre", "Eres mi todo", "Mi vida entera", "Amanecer contigo", "Mi paz interior", "Mi dulce espera", "Mi regalo", "Tu y yo", "Un solo corazón", "Amor sagrado", "Mi ilusión", "Eres mi encanto", "Mi destino fiel", "Te amo de verdad", "Mi pasión", "Mi delirio", "Eres mi bien", "Mi ángel", "Mi tesoro fiel", "Mi calma total", "Mi guía", "Te amo cada día", "Eres mi aire", "Mi respiro", "Mi suspiro", "Amor real", "Sinceridad", "Mi refugio seguro", "Contigo al fin del mundo", "Mi amor bonito", "Mi sol radiante", "Eres mi vida", "Mi gran tesoro", "Te amo mil veces", "Sin límites", "Amor de alma", "Mi latido", "Eres mi fe", "Mi constancia", "Mi puerto seguro", "Mi estrella guía", "Te amo inmenso", "Mi cielo azul", "Mi nube", "Mi rayo de luz", "Eres mi esencia", "Mi perfume", "Tu calor", "Mi abrigo", "Mi compañía", "Amor sin fronteras", "Eres mi poema", "Mi canción", "Mi melodía", "Mi ritmo", "Mi baile", "Te amo con el alma", "Mi vida es tuya", "Mi sueño hecho realidad", "Mi luna llena", "Mi amanecer", "Eres mi principio", "Mi fin", "Mi historia", "Nuestro cuento", "Amor épico", "Mi aventura", "Mi viaje", "Mi destino", "Mi hogar eterno", "Mi paz", "Te amo más que ayer", "Eres mi todo", "Mi mitad", "Mi complemento", "Mi otra parte", "Amor profundo", "Mi sentir", "Mi latir", "Mi existir", "Mi porqué", "Eres mi sol", "Mi lluvia", "Mi viento", "Mi tierra", "Mi mar", "Te amo profundamente", "Mi mayor deseo", "Mi sueño eterno", "Mi dulce amor", "Mi luz guía", "Eres mi mundo", "Mi universo", "Mi galaxia", "Mi espacio", "Mi tiempo", "Te amo por siempre", "Mi amor eterno", "Mi vida mía", "Mi todo siempre", "Juntos al fin"];
        frases = frases.sort(() => Math.random() - 0.5);

        function init() {
            // Estrellas fijas
            for (let i = 0; i < 300; i++) {
                const s = document.createElement('div');
                s.className = 'estrella-fija';
                const size = Math.random() * 2 + 0.5 + 'px';
                s.style.width = size; s.style.height = size;
                s.style.top = Math.random() * 100 + 'vh';
                s.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(s);
            }

            // Tornado optimizado (2000 partículas)
            for (let i = 0; i < 2000; i++) {
                const wrap = document.createElement('div');
                wrap.style.position = 'absolute'; wrap.style.transformStyle = 'preserve-3d';
                const ang = i * 0.1; 
                const rad = 170 + (ang * 8); 
                const x = Math.cos(ang) * rad;
                const y = (Math.random() - 0.5) * 500;
                const z = Math.sin(ang) * rad;

                const el = document.createElement('div');
                if (i % 20 === 0 && frases.length > 0) {
                    el.className = 'frase-estelar';
                    el.innerText = frases.pop(); 
                } else {
                    el.className = 'polvo';
                    const s = Math.random() * 2 + 1 + 'px';
                    el.style.width = s; el.style.height = s;
                }
                wrap.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
                wrap.appendChild(el); univ.appendChild(wrap);
            }

            // Sistema de planetas
            const pConfig = [
                {cl: '#00b4d8', os: '#03045e', r: 900, s: 40}, {cl: '#7209b7', os: '#240046', r: 1100, s: 55},
                {cl: '#00ff88', os: '#002211', r: 1300, s: 45}, {cl: '#ff0055', os: '#330011', r: 1500, s: 70},
                {cl: '#ff9e00', os: '#3d2b1f', r: 1700, s: 60}, {cl: '#ffffff', os: '#1a1a1a', r: 1900, s: 30},
                {cl: '#4cc9f0', os: '#023e8a', r: 2100, s: 35}, {cl: '#f72585', os: '#480ca8', r: 2300, s: 50},
                {cl: '#eeef20', os: '#555500', r: 2500, s: 65}, {cl: '#9d4edd', os: '#3c096c', r: 2700, s: 40},
                {cl: '#2a9d8f', os: '#133935', r: 2900, s: 45}, {cl: '#e9c46a', os: '#6c5825', r: 3100, s: 50},
                {cl: '#e76f51', os: '#602b1c', r: 3300, s: 40}, {cl: '#c77dff', os: '#480ca8', r: 3500, s: 55},
                {cl: '#fb5607', os: '#3a0ca3', r: 3700, s: 35}
            ];

            pConfig.forEach(cp => {
                const pWrap = document.createElement('div');
                pWrap.style.position = 'absolute'; pWrap.style.transformStyle = 'preserve-3d';
                const p = document.createElement('div');
                p.className = 'planeta-oscuro';
                p.style.width = cp.s + 'px'; p.style.height = cp.s + 'px';
                p.style.setProperty('--c-claro', cp.cl);
                p.style.setProperty('--c-oscuro', cp.os);
                const ang = Math.random() * Math.PI * 2;
                pWrap.style.transform = `translate3d(${Math.cos(ang)*cp.r}px, ${(Math.random()-0.5)*800}px, ${Math.sin(ang)*cp.r}px)`;
                pWrap.appendChild(p); univ.appendChild(pWrap);
            });

            // CORAZONES ESPARCIDOS (100 corazones)
            for (let i = 0; i < 100; i++) {
                const w = document.createElement('div');
                w.style.position = 'absolute'; w.style.transformStyle = 'preserve-3d';
                const cx = (Math.random() - 0.5) * 4000;
                const cy = (Math.random() - 0.5) * 2000;
                const cz = (Math.random() - 0.5) * 4000;
                const c = document.createElement('div');
                c.className = 'corazon-3d';
                c.innerHTML = '❤';
                const sc = Math.random() * 1.5 + 0.5;
                c.style.transform = `scale(${sc})`;
                w.style.transform = `translate3d(${cx}px, ${cy}px, ${cz}px)`;
                w.appendChild(c); univ.appendChild(w);
            }
        }

        let rx = 0, ry = 0, trx = 0, tryy = 0, zoom = 1, isM = false, lx, ly;

        capa.onmousedown = e => { isM = true; lx = e.clientX; ly = e.clientY; };
        window.onmouseup = () => isM = false;
        window.onmousemove = e => {
            if(isM) {
                tryy += (e.clientX - lx) * 0.3;
                trx -= (e.clientY - ly) * 0.3;
                lx = e.clientX; ly = e.clientY;
            }
        };
        window.onwheel = e => zoom = Math.max(0.1, Math.min(zoom - e.deltaY * 0.0005, 3));

        function loop() {
            if(!isM) tryy += 0.15; 
            rx += (trx - rx) * 0.05;
            ry += (tryy - ry) * 0.05;
            univ.style.transform = `scale(${zoom}) rotateX(${rx}deg) rotateY(${ry}deg)`;
            
            const orientar = document.querySelectorAll('.frase-estelar, .planeta-oscuro, .planeta-sol, .corazon-3d');
            for(let i=0; i<orientar.length; i++) {
                orientar[i].style.transform = `rotateY(${-ry}deg) rotateX(${-rx}deg)`;
            }
            requestAnimationFrame(loop);
        }

            init(); loop();
        </script>
    </body>
    </html>
